services:
  postgres:
    image: postgres:17-alpine
    container_name: stingray-postgres
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: ${POSTGRES_USER:-stingray}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stingray}
      POSTGRES_DB: ${POSTGRES_DB:-stingray}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stingray} -d ${POSTGRES_DB:-stingray}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      pull: false
    image: stingray:latest
    container_name: stingray-web
    command: ["/app/.venv/bin/uvicorn", "app:app", "--host", "0.0.0.0", "--port", "20080"]
    working_dir: /app
    environment:
      TZ: Asia/Tokyo
      PYTHONPATH: /app/backend
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-stingray}:${POSTGRES_PASSWORD:-stingray}@postgres:5432/${POSTGRES_DB:-stingray}}
    ports:
      - "${WEB_PORT:-20080}:20080"
    volumes:
      - ./backend:/app/backend:ro
      - ./config.yml:/app/config.yml:ro
      - ./cache:/app/cache
      - ./debug-feeds:/app/debug-feeds:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:20080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  fetcher:
    build:
      context: .
      pull: false
    image: stingray:latest
    container_name: stingray-fetcher
    command: ["/usr/local/bin/supercronic", "-passthrough-logs", "/app/crontab"]
    environment:
      TZ: Asia/Tokyo
      PYTHONPATH: /app/backend
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-stingray}:${POSTGRES_PASSWORD:-stingray}@postgres:5432/${POSTGRES_DB:-stingray}}
    volumes:
      - ./backend:/app/backend:ro
      - ./config.yml:/app/config.yml:ro
      - ./cache:/app/cache
      - ./debug-feeds:/app/debug-feeds:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "/app/backend/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20m
    restart: unless-stopped
