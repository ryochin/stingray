services:
  postgres:
    image: postgres:17-alpine
    container_name: news-reader-postgres
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
      POSTGRES_DB: news
    ports:
      - "25432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      pull: false
    image: news-reader:latest
    container_name: news-reader-web
    command: ["/app/.venv/bin/uvicorn", "app:app", "--host", "0.0.0.0", "--port", "20080"]
    working_dir: /app
    environment:
      TZ: Asia/Tokyo
      PYTHONPATH: /app/backend
      OLLAMA_BASE_URL: http://192.168.0.11:11434
      DATABASE_URL: postgresql://news:news@postgres:5432/news
    ports:
      - "20080:20080"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./cache:/app/cache
      - ./debug-feeds:/app/debug-feeds:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:20080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  fetcher:
    build:
      context: .
      pull: false
    image: news-reader:latest
    container_name: news-reader-fetcher
    command: ["/usr/local/bin/supercronic", "-passthrough-logs", "/app/crontab"]
    environment:
      TZ: Asia/Tokyo
      PYTHONPATH: /app/backend
      OLLAMA_BASE_URL: http://192.168.0.11:11434
      DATABASE_URL: postgresql://news:news@postgres:5432/news
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./cache:/app/cache
      - ./debug-feeds:/app/debug-feeds:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "/app/backend/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20m
    restart: unless-stopped
