name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: stingray
          POSTGRES_PASSWORD: stingray
          POSTGRES_DB: stingray
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stingray"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Type check (pyright)
        run: uv run pyright
      - name: Run tests (pytest)
        env:
          DATABASE_URL: postgresql://stingray:stingray@localhost:5432/stingray
          # Fail (don't skip) if the DB is unreachable, so the postgres service
          # wiring is actually exercised in CI.
          REQUIRE_DB: "1"
        run: uv run pytest backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (Biome)
        run: npm run lint
      - name: Type check (tsc)
        run: npx tsc -b
      - name: Run tests (Vitest)
        run: npm test
