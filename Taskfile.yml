version: "3"

vars:
  CONFIG: config.yml

tasks:
  serve:
    desc: "Start API server and frontend dev server"
    deps: [serve:api, serve:web]

  serve:api:
    desc: "Start FastAPI dev server with hot reload"
    cmds:
      - PYTHONPATH=backend uv run uvicorn app:app --host 127.0.0.1 --port 20080 --reload

  serve:web:
    desc: "Start Vite dev server (proxies /api to :20080)"
    dir: frontend
    cmds:
      - npm run dev

  build:
    desc: "Build frontend for production"
    dir: frontend
    cmds:
      - npm run build

  fetch:
    desc: "Fetch feeds and summarize"
    aliases: [f]
    cmds:
      - uv run python backend/main.py --config {{.CONFIG}}

  fetch:no-summary:
    desc: "Fetch feeds without LLM summarization"
    cmds:
      - uv run python backend/main.py --config {{.CONFIG}} --no-summary

  fetch:fresh:
    desc: "Clear feed cache and re-fetch everything"
    cmds:
      - rm -rf cache/
      - uv run python backend/main.py --config {{.CONFIG}}

  clean:
    desc: "Remove all cached data"
    cmds:
      - rm -rf cache/

  install:
    desc: "Install all dependencies"
    cmds:
      - uv sync
      - cd frontend && npm install
