version: "3"

tasks:
  install:
    desc: "Install all dependencies"
    cmds:
      - uv sync
      - cd frontend && npm install

  dev:
    desc: "Start Vite dev server (proxies /api to backend at :20080)"
    dir: frontend
    cmds:
      - npm run dev

  build:
    desc: "Build frontend for production"
    dir: frontend
    cmds:
      - npm run build

  test:
    desc: "Run backend and frontend tests"
    cmds:
      - task: test:backend
      - task: test:frontend

  test:backend:
    desc: "Run backend tests inside the web container"
    cmds:
      - docker compose up -d
      - docker compose exec web uv run pytest backend

  test:frontend:
    desc: "Run frontend tests"
    dir: frontend
    cmds:
      - npm test

  clean:
    desc: "Remove all cached feed data"
    cmds:
      - rm -rf cache/
