# -- General --
max_age_hours: 25        # How far back to include articles
cache_dir: "cache"                 # Cache directory
article_cache_max_age_days: 30     # Days to keep article cache

# -- LLM (Ollama) --
ollama:
  model: "gemma4:e4b"
  base_url: "http://localhost:11434"
  timeout: 120           # Seconds per LLM request

# -- Feed sources --
# lang: fallback language used when per-article detection is ambiguous.
# Detection: if the article title contains hiragana/katakana it is treated as "ja"
# (regardless of this setting); otherwise this value is used.
feeds:
  - name: "Hacker News"
    type: rss
    url: "https://hnrss.org/newest?points=50"
    lang: en
    max_items: 20

  - name: "Lobsters"
    type: rss
    url: "https://lobste.rs/rss"
    lang: en
    max_items: 15

  - name: "r/programming"
    type: reddit
    subreddit: "programming"
    sort: "hot"
    lang: en
    max_items: 15

  - name: "r/technology"
    type: reddit
    subreddit: "technology"
    sort: "hot"
    lang: en
    max_items: 10

  - name: "ReadWrite"
    type: rss
    url: "https://feeds.feedburner.com/readwriteweb"
    lang: en
    max_items: 20

  - name: "Science News"
    type: rss
    url: "https://www.sciencenews.org/feed"
    lang: en
    max_items: 20

  - name: "Open Culture"
    type: rss
    url: "https://www.openculture.com/feed"
    lang: en
    max_items: 20

  - name: "TechWave"
    type: rss
    url: "https://techwave.jp/feed"
    lang: ja
    max_items: 20

  - name: "はてなブックマーク"
    type: rss
    url: "https://rss.aquahill.net/dist/hatenabm/index.xml"
    lang: ja
    max_items: 25
