# -- General --
max_age_hours: 25        # How far back to include articles
output_dir: "output"     # HTML output directory
cache_dir: "cache"                 # Cache directory
article_cache_max_age_days: 30     # Days to keep article cache

# -- LLM (Ollama) --
ollama:
  model: "gemma3"
  base_url: "http://localhost:11434"
  timeout: 120           # Seconds per LLM request

# -- Feed sources --
feeds:
  - name: "Hacker News"
    type: rss
    url: "https://hnrss.org/newest?points=50"
    max_items: 20

  - name: "Lobsters"
    type: rss
    url: "https://lobste.rs/rss"
    max_items: 15

  - name: "r/programming"
    type: reddit
    subreddit: "programming"
    sort: "hot"
    max_items: 15

  - name: "r/technology"
    type: reddit
    subreddit: "technology"
    sort: "hot"
    max_items: 10

  - name: "ReadWrite"
    type: rss
    url: "https://feeds.feedburner.com/readwriteweb"
    max_items: 20

  - name: "Science News"
    type: rss
    url: "https://www.sciencenews.org/feed"
    max_items: 20

  - name: "Open Culture"
    type: rss
    url: "https://www.openculture.com/feed"
    max_items: 20
