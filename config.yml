# -- General --
native_lang: "ja"        # Your native language (feeds in other languages will be translated)
max_age_hours: 48        # How far back to include articles
max_items_per_feed: 200  # Max articles to ingest per feed on each refresh
cache_dir: "cache"                 # Cache directory
article_cache_max_age_days: 0      # Days to keep article cache (0 = keep forever)
article_order: "oldest"            # Article list order: "oldest" (oldest first) or "newest" (newest first)
# User-Agent sent when fetching feeds/pages. Defaults to a browser UA because
# some origins (e.g. exblog) reject the default httpx UA with HTTP 403.
# user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/140.0.0.0 Safari/537.36 Edg/140.0.0.0"

# -- LLM (Ollama) --
# The server URL lives in `.env` as OLLAMA_BASE_URL (it varies per host).
ollama:
  enabled: true          # Translation/summarization on/off (false disables all LLM calls)
  model: "gemma4:e4b"
  timeout: 120           # Seconds per LLM request

# -- LLM selector inference (the "Infer with LLM" button for feed-less sites) --
selector_inference:
  max_html_bytes: 150000   # Max preprocessed HTML (bytes) sent to the LLM
  max_attempts: 4          # Retries to locate the article list (temperature stays high for diversity)
  num_ctx: 65536           # Ollama context window for inference (model must support it)
  min_articles: 3          # Min extracted articles to accept (rejects small related/ranking side-lists)

# -- URL cleanup --
url_cleanup:
  enabled: true          # Strip well-known tracking params (utm_*, fbclid, gclid, ...) at ingest time

